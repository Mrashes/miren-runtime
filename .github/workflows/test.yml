name: Test

on:
  pull_request:
  merge_group:
  workflow_call:
    # Called by release.yml for main/tag builds
    inputs:
      ref:
        description: 'Git ref to test'
        required: false
        type: string
        default: ''

# Cancel in-progress runs when a new run is triggered on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Used by golangci-lint to emit annotations that are picked up by github
  contents: read
  # Used by golangci-lint for only-new-issues
  pull-requests: read

jobs:
  lint:
    runs-on: depot-ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install system dependencies
      run: |
        # Disable expensive operations on throwaway CI runners
        sudo sed -i 's/^DPkg::Post-Invoke.*//' /etc/apt/apt.conf.d/90_man-db || true
        # Install packages (depot runners have persistent images, so this is usually cached)
        sudo DEBIAN_FRONTEND=noninteractive apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends clang llvm

    - name: Cache Go tools
      id: cache-go-tools
      uses: actions/cache@v4
      with:
        path: ~/go/bin
        key: ${{ runner.os }}-go-tools-${{ hashFiles('go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-tools-

    - name: Install Go tools
      if: steps.cache-go-tools.outputs.cache-hit != 'true'
      run: |
        go install golang.org/x/tools/cmd/goimports@latest
        go install go.uber.org/mock/mockgen@latest

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.6.1

    - name: Check go.mod tidiness
      run: |
        # Run go mod tidy and check if there are any changes
        go mod tidy -diff
        if [ $? -ne 0 ]; then
          echo ""
          echo "Error: go.mod or go.sum is not tidy."
          echo "Please run 'go mod tidy' to fix module dependencies."
          exit 1
        fi
        echo "go.mod and go.sum are tidy."

    - name: Check go generate
      run: make generate-check

  test-groups:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set test matrix
      id: set-matrix
      run: |
        MATRIX=$(jq -c '.groups' hack/test-groups.json)
        echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    needs: test-groups
    runs-on: depot-ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.test-groups.outputs.matrix) }}
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install iso
      run: |
        go install miren.dev/iso/cmd/iso@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Test (runner ${{ matrix.group.runner }})
      run: |
        PACKAGES=$(echo '${{ toJson(matrix.group.packages) }}' | jq -r '.[]' | tr '\n' ' ')
        iso run DISABLE_NBD_TEST=1 bash hack/test.sh $PACKAGES -count=1 -failfast

  test-e2e:
    runs-on: depot-ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Install iso
      run: |
        go install miren.dev/iso/cmd/iso@latest
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Test
      run: make test-e2e

  build-binaries:
    # Skip when called from release.yml - it has its own build-binaries with signing
    if: github.event_name != 'workflow_call'
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: depot-ubuntu-latest
          - os: linux
            arch: arm64
            runner: depot-ubuntu-latest-arm
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Build binary for ${{ matrix.os }}-${{ matrix.arch }}
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} make bin/miren
          # Create a zip file with the binary
          zip -j miren-${{ matrix.os }}-${{ matrix.arch }}.zip bin/miren

  build:
    # Skip when called from release.yml - it has its own build jobs
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Build
      run: make bin/miren
